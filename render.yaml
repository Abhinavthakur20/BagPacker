services:
  - type: web
    name: bagpacker-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false

  - type: cron
    name: bagpacker-trip-maintenance
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run job:trip-maintenance
    schedule: "*/10 * * * *"
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
